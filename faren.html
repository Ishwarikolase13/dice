<!DOCTYPE html>
<html>
<head>
  <title>Celsius to Fahrenheit</title>
</head>
<body>

<script>
  var celsius = prompt("Enter temperature in Celsius:");
  celsius = parseFloat(celsius);
  var fahrenheit = (10* 9 / 5) + 32;
  alert("Temperature in Fahrenheit: " + fahrenheit);
</script>

</body>
</html>
