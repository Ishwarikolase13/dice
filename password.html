<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show Hide Password</title>

<style>
    body {
        background: linear-gradient(135deg,#667eea,#764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .password-box {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        width: 280px;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 15px;
        padding: 8px 15px;
        border: none;
        background: #667eea;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background:#5a67d8;
    }
</style>
</head>

<body>

<div class="password-box">
    <h2>🔐 Password</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <button onclick="togglePassword()">Show</button>
</div>

<script>
function togglePassword() {
    let input = document.getElementById("pass");
    let btn = event.target;

    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "Hide";
    } else {
        input.type = "password";
        btn.innerText = "Show";
    }
}
</script>

</body>
</html>
