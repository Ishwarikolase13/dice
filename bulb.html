<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulb ON OFF</title>

<style>
    body {
        background:#111;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
    }

    .box {
        text-align:center;
    }

    img {
        width:180px;
        transition:0.3s;
    }

    button {
        margin:10px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        border-radius:6px;
        cursor:pointer;
    }

    .on {
        background:limegreen;
        color:white;
    }

    .off {
        background:red;
        color:white;
    }
</style>
</head>

<body>

<div class="box">
    <h1>💡 Bulb ON / OFF</h1>

    <img id="bulb"
         src="https://www.w3schools.com/js/pic_bulboff.gif">

    <br><br>

    <button class="on" onclick="turnOn()">ON</button>
    <button class="off" onclick="turnOff()">OFF</button>
</div>

<script>
function turnOn() {
    document.getElementById("bulb").src =
    "https://www.w3schools.com/js/pic_bulbon.gif";
}

function turnOff() {
    document.getElementById("bulb").src =
    "https://www.w3schools.com/js/pic_bulboff.gif";
}
</script>

</body>
</html>
