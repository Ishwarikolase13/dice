<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice Roller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dice-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .dice {
            font-size: 100px;
            margin: 20px 0;
            transition: transform 0.3s ease;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background-color: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a67d8;
        }
    </style>
</head>
<body>

<div class="dice-container">
    <h1>🎲 Dice Roller</h1>
    <div class="dice" id="dice">🎲</div>
    <button onclick="rollDice()">Roll Dice</button>
    <p id="result"></p>
</div>

<script>
    function rollDice() {
        let diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        let randomNumber = Math.floor(Math.random() * 6);

        let dice = document.getElementById("dice");
        let result = document.getElementById("result");

        dice.style.transform = "rotate(360deg)";
        dice.innerHTML = diceFaces[randomNumber];
        result.innerHTML = "You rolled: " + (randomNumber + 1);

        setTimeout(() => {
            dice.style.transform = "rotate(0deg)";
        }, 300);
    }
</script>

</body>
</html>
